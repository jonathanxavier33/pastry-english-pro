<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pastry English">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1612">
    <meta name="format-detection" content="telephone=no">
    <title>Pastry English Pro</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧁</text></svg>">
    
    <style>
        :root {
            --bg-primary: #1a1612;
            --bg-secondary: #2d2520;
            --bg-card: #3a322b;
            --fg-primary: #f5f0eb;
            --fg-secondary: #b8a99a;
            --fg-muted: #8a7d72;
            --accent: #e07a5f;
            --accent-light: #f2a98b;
            --success: #6b9b6b;
            --error: #c45c5c;
            --border: #4a423a;
            --shadow: rgba(0,0,0,0.4);
            --gold: #D4AF37;
            --gold-light: #F4E4BA;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }
        
        html, body {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--fg-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
        }

        /* ACCUEIL */
        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            text-align: center;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(224,122,95,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(224,122,95,0.1) 0%, transparent 50%),
                var(--bg-primary);
        }

        #home-screen h1 {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 900;
            color: var(--fg-primary);
            margin-bottom: 6px;
        }

        .subtitle { 
            color: var(--fg-secondary); 
            font-size: 0.95rem; 
            margin-bottom: 20px; 
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 20px;
        }

        .image-grid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .home-stats {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 320px;
            border: 1px solid var(--border);
        }

        .home-level {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .home-level-icon { font-size: 1.8rem; }
        .home-level-info { text-align: left; }
        .home-level-name { font-weight: bold; color: var(--accent); font-size: 0.9rem; }
        .home-level-xp { font-size: 0.8rem; color: var(--fg-secondary); }

        .btn-start {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: var(--bg-primary);
            border: none;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            min-height: 50px;
            box-shadow: 0 4px 16px rgba(224,122,95,0.3);
        }

        .btn-start:active { transform: scale(0.96); }

        .btn-exam {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--bg-primary);
            border: none;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            min-height: 44px;
            margin-top: 10px;
        }

        #game-screen { display: none; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }

        /* HEADER */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--fg-primary);
        }

        .btn-home {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--fg-secondary);
            width: 44px;
            height: 44px;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BARRE DE PROGRESSION */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .level-info { display: flex; align-items: center; gap: 8px; }
        .level-icon { font-size: 1.3rem; }
        .level-text { text-align: left; }
        .level-name { font-weight: bold; font-size: 0.85rem; color: var(--accent); }
        .level-title { font-size: 0.7rem; color: var(--fg-muted); }

        .xp-info { text-align: right; }
        .xp-count { font-weight: bold; color: var(--gold); font-size: 0.85rem; }
        .xp-next { font-size: 0.65rem; color: var(--fg-muted); }

        .progress-container {
            width: 100%;
            background: var(--bg-card);
            border-radius: 12px;
            height: 26px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--border);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            position: relative;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-pastry {
            position: absolute;
            top: -2px;
            right: -16px;
            transform: translateX(-100%);
            transition: left 0.5s ease;
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));
            z-index: 10;
        }

        /* NOUVEAU: Labels des niveaux sur la barre de progression */
        .level-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            padding: 0 2px;
        }

        .level-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            position: relative;
        }

        .level-label-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .level-label-name {
            font-size: 0.55rem;
            color: var(--fg-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .level-label.passed .level-label-dot {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(224,122,95,0.5);
        }

        .level-label.passed .level-label-name {
            color: var(--accent);
        }

        .level-label.current .level-label-dot {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212,175,55,0.6);
            animation: pulse 2s infinite;
        }

        .level-label.current .level-label-name {
            color: var(--gold);
            font-weight: 700;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Ancien style pour compatibilité */
        .level-dots { display: flex; justify-content: space-between; margin-top: 6px; padding: 0 2px; }
        
        .level-dot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .level-dot-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
        }

        .level-dot.passed .level-dot-circle {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-color: var(--accent);
        }

        .level-dot.current .level-dot-circle {
            border-color: var(--gold);
        }

        .level-dot-name { font-size: 0.5rem; color: var(--fg-muted); font-weight: 600; }
        .level-dot.passed .level-dot-name, .level-dot.current .level-dot-name { color: var(--accent); }

        /* MENUS */
        .menu-scroll {
            display: flex;
            overflow-x: auto;
            padding: 8px 12px;
            gap: 6px;
            background: var(--bg-secondary);
            white-space: nowrap;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .menu-scroll::-webkit-scrollbar { display: none; }

        .menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--fg-secondary);
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            flex-shrink: 0;
            min-height: 40px;
        }

        .menu-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            overflow-y: auto;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(224,122,95,0.08) 0%, transparent 60%),
                var(--bg-primary);
        }

        .game-area {
            background: var(--bg-card);
            width: 100%;
            max-width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 20px var(--shadow);
        }

        /* NOUVEAU: Compteur de cartes/questions */
        .card-counter {
            position: absolute;
            top: 8px;
            right: 12px;
            background: var(--bg-secondary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--fg-secondary);
            border: 1px solid var(--border);
        }

        .game-area {
            position: relative;
        }

        /* NOUVEAU: Numéro de quiz */
        .quiz-number {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 8px;
        }

        /* BOUTONS QUIZ */
        .quiz-options { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            margin-top: 14px; 
        }

        .quiz-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            color: var(--fg-primary);
            padding: 14px 10px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
            line-height: 1.3;
        }

        .quiz-btn:active { transform: scale(0.98); }
        .quiz-btn.correct { background: var(--success); border-color: var(--success); color: white; }
        .quiz-btn.wrong { background: var(--error); border-color: var(--error); color: white; }
        .quiz-btn:disabled { opacity: 0.7; cursor: default; }

        .card-word {
            font-size: clamp(1.6rem, 5vw, 2rem);
            font-weight: 800;
            color: var(--fg-primary);
            margin: 10px 0;
            min-height: 50px;
            cursor: pointer;
            line-height: 1.2;
        }

        .card-example {
            font-style: italic;
            color: var(--fg-secondary);
            font-size: 0.95rem;
            margin-top: 10px;
            min-height: 32px;
            line-height: 1.4;
        }

        .card-hint { color: var(--fg-muted); font-size: 0.8rem; margin-top: 6px; }

        .controls-area {
            width: 100%;
            margin-top: 14px;
        }

        .nav-buttons { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 8px; 
        }

        .btn-nav {
            background: var(--bg-secondary);
            color: var(--fg-primary);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            min-height: 48px;
        }

        .btn-sound {
            background: var(--accent);
            color: var(--bg-primary);
            flex: 0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.3rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .btn-nav:disabled { opacity: 0.5; cursor: default; }
        .btn-action { 
            width: 100%; 
            background: linear-gradient(135deg, var(--accent), var(--accent-light)); 
            color: var(--bg-primary); 
            border: none; 
        }
        .btn-success { background: linear-gradient(135deg, var(--success), #8bc38b) !important; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)) !important; }

        .quiz-question { font-size: 1rem; color: var(--fg-secondary); margin-bottom: 6px; }
        .quiz-question b { display: block; font-size: 1.3rem; color: var(--fg-primary); margin-top: 6px; }

        .timer { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-top: 10px; font-variant-numeric: tabular-nums; }
        .timer.warning { color: var(--error); }

        .mode-label {
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .roleplay-context {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 3px solid var(--accent);
        }

        .roleplay-scenario { font-weight: 700; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 4px; }
        .roleplay-dialog { background: var(--bg-card); padding: 8px; border-radius: 6px; font-style: italic; color: var(--fg-secondary); font-size: 0.9rem; }

        .recipe-container { display: flex; width: 100%; gap: 12px; align-items: stretch; }
        .recipe-info { flex: 1; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--border); padding-right: 12px; text-align: right; }
        .recipe-steps { flex: 1.5; display: flex; flex-direction: column; gap: 5px; }
        .recipe-step { font-size: 0.85rem; min-height: 42px; }
        .recipe-step.selected { background: var(--accent) !important; color: var(--bg-primary) !important; border-color: var(--accent) !important; }

        /* EXAM STYLES */
        .exam-intro {
            text-align: left;
            padding: 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .exam-intro h3 { color: var(--gold); margin-bottom: 6px; font-size: 1rem; }
        .exam-intro p { color: var(--fg-secondary); font-size: 0.85rem; line-height: 1.4; }

        .writing-area {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
        }

        .writing-textarea {
            width: 100%;
            min-height: 100px;
            background: transparent;
            border: none;
            color: var(--fg-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            -webkit-appearance: none;
        }

        .word-count { font-size: 0.75rem; color: var(--fg-muted); text-align: right; margin-top: 6px; }
        .word-count.ok { color: var(--success); font-weight: bold; }

        .correction-box {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
            text-align: left;
        }

        .score-display { text-align: center; padding: 14px; background: var(--bg-card); border-radius: 10px; margin: 10px 0; }
        .score-big { font-size: 2.2rem; font-weight: bold; color: var(--gold); }
        .score-label { font-size: 0.85rem; color: var(--fg-secondary); }

        .feedback-section { margin-top: 10px; padding: 10px; border-radius: 8px; }
        .feedback-correct { background: rgba(107,155,107,0.2); border-left: 3px solid var(--success); }
        .feedback-wrong { background: rgba(196,92,92,0.2); border-left: 3px solid var(--error); }

        /* NOUVEAU: Styles pour la correction IA */
        .ai-correction-section {
            background: linear-gradient(135deg, rgba(224,122,95,0.1), rgba(242,169,139,0.1));
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            text-align: left;
        }

        .ai-correction-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--accent);
            font-weight: 700;
        }

        .ai-correction-content {
            color: var(--fg-primary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .ai-correction-content .error-highlight {
            background: rgba(196,92,92,0.3);
            padding: 2px 4px;
            border-radius: 4px;
            text-decoration: line-through;
        }

        .ai-correction-content .correction-highlight {
            background: rgba(107,155,107,0.3);
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 600;
        }

        .ai-score {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .ai-score-score {
            font-weight: 700;
            color: var(--gold);
        }

        .btn-ai-correct {
            background: linear-gradient(135deg, #8B5CF6, #A78BFA);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .btn-ai-correct:hover {
            transform: scale(1.02);
        }

        .btn-ai-correct:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .api-key-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .api-key-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: var(--fg-primary);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .api-key-input::placeholder {
            color: var(--fg-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--fg-muted);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive adjustments */
        @media (max-width: 360px) {
            .quiz-btn { font-size: 0.9rem; padding: 12px 8px; }
            .card-word { font-size: 1.5rem; }
            .menu-btn { padding: 8px 12px; font-size: 0.8rem; }
            .level-label-name { font-size: 0.45rem; }
        }

        /* iOS specific fixes */
        @supports (-webkit-touch-callout: none) {
            .btn-start, .btn-action, .quiz-btn, .menu-btn, .btn-nav, .btn-sound {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>

    <!-- ACCUEIL -->
    <div id="home-screen">
        <div style="font-size: 3rem; margin-bottom: 6px;">🧁</div>
        <h1>Pastry English Pro</h1>
        <p class="subtitle">Formation anglais pâtisserie - CAP / MC / BP</p>
        
        <div class="image-grid">
            <img src="https://images.unsplash.com/photo-1519915028121-7d3463d20b13?auto=format&fit=crop&w=400&q=80" alt="Patisserie">
            <img src="https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?auto=format&fit=crop&w=400&q=80" alt="Macarons">
        </div>

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function speak(text) {
            try {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-GB';
                u.rate = 0.9;
                window.speechSynthesis.speak(u);
            } catch(e) { console.log('Speech not available'); }
        }

        function addXP(n) {
            xp += n;

            updateProgress();
        }

        function getLevel() {
            for (let i = 5; i >= 1; i--) {
                if (xp >= LEVELS[i].xp) {
                    return { lvl: i, ...LEVELS[i], next: LEVELS[i+1] };
                }
            }
            return { lvl: 1, ...LEVELS[1], next: LEVELS[2] };
        }

        function countWords(text) {
            return text.trim().split(/\s+/).filter(w => w.length > 0).length;

        // ==========================================

        function updateProgress() {
            const L = getLevel();
            
            document.getElementById('lvl-icon').textContent = L.icon;
            document.getElementById('lvl-name').textContent = `Niveau ${L.lvl} · ${L.name}`;
            document.getElementById('lvl-title').textContent = L.title;
            document.getElementById('xp-count').textContent = `${xp} XP`;
            
            if (L.next) {
                document.getElementById('xp-next').textContent = `${L.next.xp - xp} XP niveau suivant`;
            } else {
                document.getElementById('xp-next').textContent = "Niveau maximum !";
            }

            const prevXp = LEVELS[L.lvl].xp;
            const nextXp = L.next ? L.next.xp : L.xp;
            const pct = L.next ? Math.min(100, ((xp - prevXp) / (nextXp - prevXp)) * 100) : 100;
            
            document.getElementById('progress-bar').style.width = pct + '%';

            // NOUVEAU: Afficher les noms des niveaux sur la barre de progression
            let labels = '';
            for (let i = 1; i <= 5; i++) {
                const passed = xp >= LEVELS[i].xp;
                const current = i === L.lvl;
                labels += `<div class="level-label ${passed ? 'passed' : ''} ${current ? 'current' : ''}">
                    <div class="level-label-dot">${LEVELS[i].icon}</div>
                    <span class="level-label-name">${LEVELS[i].shortName}</span>
                </div>`;
            }
            document.getElementById('level-labels').innerHTML = labels;
        }

        function loadTheme(t) {
            theme = t;
            deck = database[t] ? shuffle([...database[t]]) : [];
            idx = 0;
            flipped = false;
            quizNumber = 0;
            totalQuizzes = deck.length;
            renderThemeMenu();
            renderQuestion();
        }

        function setMode(m) {
            if (rushTimer) clearInterval(rushTimer);
            mode = m;
            idx = 0;
            quizNumber = 0;
            renderModeMenu();
            renderThemeMenu();

            switch(m) {
                case 'listening': initListening(); break;
                case 'roleplay': initRoleplay(); break;
                case 'world': initWorld(); break;
                case 'recipe': initRecipe(); break;
                case 'rush': initRush(); break;

        // ==========================================
        // FLASHCARD & QUIZ - Avec compteurs
        // ==========================================
        function renderQuestion() {
            if (!deck.length) return;
            const item = deck[idx];
            const area = document.getElementById('game-area');
            const controls = document.getElementById('controls-area');

            if (mode === 'flashcard') {
                const displayWord = flipped ? item.en : item.fr;
                const displayEx = flipped ? item.exemple : "Tap to flip";

                // NOUVEAU: Afficher le compteur de cartes
                area.innerHTML = `
                    <span class="card-counter">📚 Carte ${idx + 1}/${deck.length}</span>
                    <div class="mode-label">Flashcard</div>
                    <div class="card-word" id="flip-card">${displayWord}</div>
                    <div class="card-example">${displayEx}</div>
                `;

                controls.innerHTML = `
                    <button class="btn-nav" id="prev-btn" ${idx === 0 ? 'disabled' : ''}>◀ Prev</button>
                    <button class="btn-sound" id="speak-btn">🔊</button>
                    <button class="btn-nav" id="next-btn">Next ▶</button>
                `;

                document.getElementById('flip-card').addEventListener('click', () => { 
                    flipped = !flipped; 
                    renderQuestion(); 
                    if (flipped) speak(item.en); 
                });
                document.getElementById('prev-btn').addEventListener('click', () => { if (idx > 0) { idx--; flipped = false; renderQuestion(); } });
                document.getElementById('next-btn').addEventListener('click', () => { idx = (idx + 1) % deck.length; if (idx === 0) deck = shuffle(deck); flipped = false; renderQuestion(); });
                document.getElementById('speak-btn').addEventListener('click', () => speak(item.en));

            } else if (mode === 'quiz') {
                let opts = [item.en];
                const allWords = Object.values(database).flat().map(x => x.en);
                while (opts.length < 4) {
                    const r = allWords[Math.floor(Math.random() * allWords.length)];
                    if (!opts.includes(r)) opts.push(r);
                }
                opts = shuffle(opts);

                // NOUVEAU: Afficher le numéro du quiz
                area.innerHTML = `
                    <span class="card-counter">❓ Quiz ${idx + 1}/${deck.length}</span>
                    <div class="quiz-number">Question ${idx + 1}</div>
                    <div class="quiz-question">Translate:<br><b>${item.fr}</b></div>
                    <div class="quiz-options">
                        ${opts.map(o => `<button class="quiz-btn" data-opt="${o}">${o}</button>`).join('')}
                    </div>
                `;

                controls.innerHTML = '<button class="btn-nav btn-action" id="skip-btn">Skip</button>';

                document.querySelectorAll('.quiz-btn').forEach(btn => {
                    btn.addEventListener('click', () => checkQuiz(btn.dataset.opt, item.en));
                });
                document.getElementById('skip-btn').addEventListener('click', () => { idx = (idx + 1) % deck.length; renderQuestion(); });
            }
        }

        function checkQuiz(selected, correct) {
            const isCorrect = selected === correct;
            if (isCorrect) addXP(10);

            document.querySelectorAll('.quiz-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.dataset.opt === correct) btn.classList.add('correct');
                if (btn.dataset.opt === selected && !isCorrect) btn.classList.add('wrong');
            });

            document.getElementById('controls-area').innerHTML = `
                <button class="btn-nav btn-action ${isCorrect ? 'btn-success' : ''}" id="next-quiz">
                    ${isCorrect ? '✓ Correct! +10 XP' : '✗ Answer: ' + correct}
                </button>

            document.getElementById('next-quiz').addEventListener('click', () => { idx = (idx + 1) % deck.length; renderQuestion(); });
        }

            rushItem = allItems[Math.floor(Math.random() * allItems.length)];

            }
        });

        // ==========================================
        // CORRECTION IA - NOUVEAU MODULE
        // ==========================================
        async function correctWithAI(userText, prompt, modelAnswer) {
            if (!apiKey) {
                alert('Veuillez d\'abord configurer votre clé API dans les paramètres.');
                return null;
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            {
                                role: 'system',
                                content: `You are an expert English teacher specializing in pastry and culinary arts. Correct the student's writing and provide constructive feedback.

Your response MUST be in this JSON format:
{
  "score": <number 0-100>,
  "correctedText": "<corrected version>",
  "errors": [
    {"original": "<error>", "correction": "<fix>", "type": "grammar|vocabulary|spelling|style"}
  ],
  "feedback": "<encouraging feedback in French>",
  "strengths": ["<what was done well>"],
  "suggestions": ["<specific improvement suggestions>"]
}

Be encouraging but thorough. Focus on culinary/pastry vocabulary and professional English.`
                            },
                            {
                                role: 'user',
                                content: `Task: ${prompt}\n\nStudent's answer:\n${userText}\n\nModel answer for reference:\n${modelAnswer}`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // Parse JSON response
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    return JSON.parse(jsonMatch[0]);
                }
                throw new Error('Invalid response format');
            } catch (error) {
                console.error('AI Correction Error:', error);
                return {
                    error: true,
                    message: error.message || 'Erreur lors de la correction IA'
                };
            }
        }

        function renderAICorrection(correction, userText) {
            if (correction.error) {
                return `
                    <div class="ai-correction-section" style="border-color: var(--error);">
                        <div class="ai-correction-header">❌ Erreur</div>
                        <p style="color: var(--fg-secondary);">${correction.message}</p>
                        <p style="color: var(--fg-muted); font-size: 0.8rem; margin-top: 8px;">

            let errorsHtml = '';

                errorsHtml = correction.errors.map(e => `
                    <div style="margin: 6px 0; padding: 6px 10px; background: var(--bg-card); border-radius: 6px;">

            let strengthsHtml = '';

                strengthsHtml = correction.strengths.map(s => `<li>${s}</li>`).join('');
            }

            let suggestionsHtml = '';
            if (correction.suggestions && correction.suggestions.length > 0) {

            return `

                    <div class="ai-score">
                        Score: <span class="ai-score-score">${correction.score}/100</span>

                    <div style="margin-top: 12px;">

                    </div>
                    ` : ''}
                    
                    ${strengthsHtml ? `
                    <div style="margin-top: 12px;">
                        <strong style="color: var(--success);">✓ Points forts:</strong>
                        <ul style="margin-top: 4px; margin-left: 16px; color: var(--fg-secondary);">${strengthsHtml}</ul>
                    </div>
                    ` : ''}
                    
                    ${suggestionsHtml ? `
                    <div style="margin-top: 12px;">

        function startExamTimer() {
            examTimer = setInterval(() => {
                examTimeLeft--;
                const mins = Math.floor(examTimeLeft / 60);
                const secs = examTimeLeft % 60;
                const titleEl = document.getElementById('lvl-title');
                if (titleEl) {
                    titleEl.textContent = `Temps: ${mins}:${secs.toString().padStart(2, '0')}`;

                    clearInterval(examTimer);
                    finishExam();

        function renderExamQuestion() {
            const q = examQuestions[examIndex];
            const area = document.getElementById('game-area');
            const controls = document.getElementById('controls-area');

            const mins = Math.floor(examTimeLeft / 60);
            const secs = examTimeLeft % 60;

            document.getElementById('lvl-name').textContent = `EXAMEN - ${currentExamSubject}`;
            document.getElementById('lvl-title').textContent = `Temps: ${mins}:${secs.toString().padStart(2, '0')}`;

            if (q.type === 'mcq') {
                const opts = shuffle([...q.options]);

                // NOUVEAU: Afficher le numéro de question
                area.innerHTML = `
                    <span class="card-counter">📝 Question ${examIndex + 1}/${examQuestions.length}</span>
                    <div class="quiz-number">Question ${examIndex + 1}/${examQuestions.length}</div>
                    <div class="quiz-question" style="margin-top:10px;">${q.question}</div>
                    <div class="quiz-options">
                        ${opts.map(o => `<button class="quiz-btn" data-opt="${o}">${o}</button>`).join('')}
                    </div>
                `;

                controls.innerHTML = '';

                document.querySelectorAll('.quiz-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        examAnswers[examIndex] = btn.dataset.opt;
                        const isCorrect = btn.dataset.opt === q.correct;
                        if (isCorrect) addXP(10);
                        
                        document.querySelectorAll('.quiz-btn').forEach(b => {
                            b.disabled = true;
                            if (b.dataset.opt === q.correct) b.classList.add('correct');
                            if (b.dataset.opt === btn.dataset.opt && !isCorrect) b.classList.add('wrong');
                        });

                        controls.innerHTML = `
                            <button class="btn-nav btn-action ${isCorrect ? 'btn-success' : ''}" id="exam-next">
                                ${isCorrect ? '✓ Correct!' : '✗ Next'}
                            </button>
                        `;
                        document.getElementById('exam-next').addEventListener('click', () => nextExamQuestion());
                    });
                });

            } else if (q.type === 'writing') {
                const saved = examAnswers[examIndex] || '';
                const wc = saved ? countWords(saved) : 0;

                // NOUVEAU: Afficher le numéro et inclure la correction IA
                area.innerHTML = `
                    <span class="card-counter">✍️ Rédaction ${examIndex + 1}/${examQuestions.length}</span>
                    <div class="quiz-number">Writing Task ${examIndex + 1}</div>
                    <div class="exam-intro">
                        <p>${q.prompt.replace(/\n/g, '<br>')}</p>
                        <p style="font-size:0.8rem; color:var(--fg-muted); margin-top:8px;">Min: ${q.wordMin} words | Max: ${q.wordMax} words</p>
                    </div>
                    ${showAPIKeyDialog()}
                    <div class="writing-area">
                        <textarea class="writing-textarea" id="exam-writing" placeholder="Write your answer here...">${saved}</textarea>
                        <div class="word-count ${wc >= q.wordMin ? 'ok' : ''}">${wc} words</div>
                    </div>
                    <div id="ai-correction-container"></div>
                `;

                controls.innerHTML = `
                    <button class="btn-ai-correct" id="ai-correct-btn" ${wc < q.wordMin ? 'disabled' : ''}>
                        🤖 Corriger avec IA
                    </button>
                    <button class="btn-nav btn-action btn-gold" id="submit-writing" style="margin-top: 10px;" ${wc < q.wordMin ? 'disabled' : ''}>
                        Submit Answer
                    </button>
                `;

                const textarea = document.getElementById('exam-writing');
                const wcDisplay = area.querySelector('.word-count');
                const submitBtn = document.getElementById('submit-writing');
                const aiCorrectBtn = document.getElementById('ai-correct-btn');
                const saveApiKeyBtn = document.getElementById('save-api-key');
                const apiKeyInput = document.getElementById('api-key-input');

                // Sauvegarder la clé API
                if (saveApiKeyBtn) {
                    saveApiKeyBtn.addEventListener('click', () => {
                        const newKey = apiKeyInput.value.trim();
                        if (newKey) {
                            apiKey = newKey;
                            try { localStorage.setItem('pastryApiKey', apiKey); } catch(e) {}
                            alert('✓ Clé API sauvegardée!');
                        }
                    });
                }

                textarea.addEventListener('input', () => {
                    const count = countWords(textarea.value);
                    wcDisplay.textContent = count + ' words';
                    wcDisplay.className = 'word-count ' + (count >= q.wordMin ? 'ok' : '');
                    submitBtn.disabled = count < q.wordMin;
                    aiCorrectBtn.disabled = count < q.wordMin;
                });

                // NOUVEAU: Correction IA
                aiCorrectBtn.addEventListener('click', async () => {
                    const userText = textarea.value.trim();
                    if (userText.length < q.wordMin) return;
                    
                    aiCorrectBtn.disabled = true;
                    aiCorrectBtn.innerHTML = '<span class="loading-spinner"></span> Correction en cours...';
                    
                    const correction = await correctWithAI(userText, q.prompt, q.modelAnswer);
                    
                    const container = document.getElementById('ai-correction-container');
                    if (correction) {
                        container.innerHTML = renderAICorrection(correction, userText);
                        
                        // Ajouter XP basé sur le score
                        if (!correction.error && correction.score) {
                            const xpEarned = Math.round(correction.score / 10);
                            addXP(xpEarned);
                        }
                    }
                    
                    aiCorrectBtn.disabled = false;
                    aiCorrectBtn.innerHTML = '🤖 Corriger à nouveau';
                });

                submitBtn.addEventListener('click', () => {
                    examAnswers[examIndex] = textarea.value;
                    addXP(15);
                    
                    area.innerHTML += `
                        <div class="correction-box">
                            <div class="score-display">
                                <div class="score-big">+15 XP</div>
                                <div class="score-label">Writing submitted</div>
                            </div>
                            <p style="font-size:0.85rem; color:var(--fg-secondary); margin-top:10px;">
                                <strong>Model answer:</strong><br>
                                <em style="color:var(--fg-muted);">${q.modelAnswer}</em>
                            </p>
                        </div>
                    `;

                    controls.innerHTML = '<button class="btn-nav btn-action btn-gold" id="next-writing">Next Question</button>';
                    document.getElementById('next-writing').addEventListener('click', () => nextExamQuestion());
                });
            }
        }

        function nextExamQuestion() {
            examIndex++;
            if (examIndex >= examQuestions.length) {
                finishExam();
            } else {
                renderExamQuestion();
            }
        }

        function finishExam() {
            clearInterval(examTimer);
            examMode = false;

            let correct = 0;
            examQuestions.forEach((q, i) => {
                if (q.type === 'mcq' && examAnswers[i] === q.correct) correct++;
                if (q.type === 'writing' && examAnswers[i]) correct += 0.8;
            });
            const score = Math.round((correct / examQuestions.length) * 100);

            document.getElementById('game-area').innerHTML = `
                <div style="text-align:center;">
                    <div style="font-size:3rem; margin-bottom:10px;">${score >= 70 ? '🏆' : score >= 50 ? '👍' : '📚'}</div>
                    <h2 style="color:var(--fg-primary); margin-bottom:16px;">Exam Complete!</h2>
                    <div class="score-display" style="margin:16px 0;">
                        <div class="score-big">${score}%</div>
                        <div class="score-label">${score >= 70 ? 'Excellent!' : score >= 50 ? 'Good work!' : 'Keep practicing!'}</div>
                    </div>
                    <p style="color:var(--fg-secondary);">Subject: ${currentExamSubject}</p>
                    <p style="color:var(--fg-muted); font-size:0.85rem; margin-top:6px;">Correct answers: ${Math.round(correct)}/${examQuestions.length}</p>
                </div>
            `;

            document.getElementById('controls-area').innerHTML = `
                <button class="btn-nav btn-action btn-gold" id="exam-home">Return Home</button>
            `;
            document.getElementById('exam-home').addEventListener('click', () => goHome());
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            updateHomeStats();

            document.getElementById('start-btn').addEventListener('click', () => startApp());
            document.getElementById('back-btn').addEventListener('click', () => goHome());

            document.getElementById('mode-menu').addEventListener('click', e => {
                if (e.target.dataset.mode) setMode(e.target.dataset.mode);
            });

            document.getElementById('theme-menu').addEventListener('click', e => {
                if (e.target.dataset.theme) loadTheme(e.target.dataset.theme);
            });

            document.getElementById('exam-btn').addEventListener('click', () => {
                const area = document.getElementById('home-stats');
                area.style.display = 'block';
                area.innerHTML = `
                    <p style="color:var(--fg-primary); font-weight:bold; margin-bottom:10px;">Select Exam Subject:</p>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        ${Object.entries(examSubjects).map(([k, v]) => `
                            <button class="quiz-btn" style="min-height:54px;" data-exam="${k}">
                                <span style="font-size:1.3rem;">${v.icon}</span><br>
                                <span style="font-size:0.8rem;">${k}</span>
                            </button>
                        `).join('')}
                    </div>
                `;
                
                document.querySelectorAll('[data-exam]').forEach(btn => {
                    btn.addEventListener('click', () => startExam(btn.dataset.exam));
                });
            });
        });
        
        // iOS standalone mode fix
        if (window.navigator.standalone) {
            document.body.classList.add('standalone');
        }
    </script>
</body>
</html>
